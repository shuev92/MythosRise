name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d app_source

      - name: The Ultimate Fixes and Build
        run: |
          ROOT_PATH=$(find app_source -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"

          # 1. Библиотеки
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. Поправка на счупения XML
          XML_FILE=$(find . -name "activity_world_map.xml" -print -quit)
          if [ -n "$XML_FILE" ]; then
            sed -i '124,$d' "$XML_FILE"
          fi

          # 3. Версия на Android
          APP_GRADLE=$(find . -name "build.gradle" -path "*/app/*" -print -quit)
          if [ -n "$APP_GRADLE" ]; then
            sed -i 's/minSdk .*/minSdk 26/g' "$APP_GRADLE"
            sed -i 's/minSdkVersion .*/minSdkVersion 26/g' "$APP_GRADLE"
          fi

          # 4. ИЗТРИВАМЕ СТАРИТЕ ВЕРСИИ И НАСОЧВАМЕ КЪМ V6
          find . -name "WorldMapActivity.kt" -exec rm -f {} \;
          find . -name "WorldMapActivityV5.kt" -exec rm -f {} \;
          find . -name "*.kt" -exec sed -i 's/WorldMapActivity::class/WorldMapActivityV6::class/g' {} \;

          # 5. Масово заглушаване на стари променливи
          find . -name "*.kt" -exec sed -i '/isFakeBoldText/s/^/\/\/ /g' {} \;
          find . -name "*.kt" -exec sed -i '/progressTarget/s/^/\/\/ /g' {} \;

          # 6. Специфични единични грешки
          STORY=$(find . -name "StoryActivity.kt" -print -quit)
          [ -n "$STORY" ] && sed -i '205s/.*/\/\/ &/' "$STORY"

          V6=$(find . -name "WorldMapActivityV6.kt" -print -quit)
          [ -n "$V6" ] && sed -i '123s/.*/\/\/ &/; 141s/.*/\/\/ &/; 196s/.*/\/\/ &/; 226s/.*/\/\/ &/; 228s/.*/\/\/ &/' "$V6"

          # 7. ГРЕШКИ В PRESTIGE
          PRESTIGE=$(find . -name "PrestigeActivity.kt" -print -quit)
          [ -n "$PRESTIGE" ] && sed -i '61s/.*/\/\/ &
