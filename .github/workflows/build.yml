name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Everything
        run: |
          # 1. Сваляме и разархивираме главния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Намираме вътрешния проект и го разархивираме в папка 'src'
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d src

      - name: Install Gradle and Build
        run: |
          # 1. Инсталираме Gradle директно в системата (това решава проблема с липсващия gradlew)
          sudo apt-get update
          sudo apt-get install -y gradle
          
          # 2. Намираме къде е build.gradle
          ROOT_PATH=$(find src -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"
          
          echo "Проектът е намерен в: $PWD"
          
          # 3. Стартираме компилацията чрез системния gradle
          gradle assembleDebug --stacktrace

      - name: Find and Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
