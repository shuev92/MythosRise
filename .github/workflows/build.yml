name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          # 1. Сваляне и разархивиране на основния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Намиране и разархивиране на вътрешния проект
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (Strict Version Control)
        run: |
          # Намираме корена на проекта
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          # ФИКС: Ръчно инсталираме Gradle 7.5, за да избегнем грешката с "версия 10"
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-7.5/bin:$PATH
          
          # Генерираме wrapper и стартираме компилацията
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew assembleDebug -x lint

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
