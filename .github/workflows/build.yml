name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Без кеш, за да избегнем първата грешка от снимката ти

      - name: Download project zip
        run: wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O project.zip

      - name: Unzip and Move Files
        run: |
          unzip project.zip
          # Тази команда намира къде е gradlew и мести всичко от тази папка тук
          CHILD_DIR=$(find . -maxdepth 2 -name "gradlew" -exec dirname {} \;)
          if [ ! -z "$CHILD_DIR" ] && [ "$CHILD_DIR" != "." ]; then
            mv $CHILD_DIR/* .
          fi
          rm -rf project.zip

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "Грешка: gradlew все още не е намерен!"
            ls -R
            exit 1
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
