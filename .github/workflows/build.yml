name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (Compatibility Mode)
        run: |
          # Намираме корена на проекта
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          # Генерираме Gradle wrapper (версия 7.5 е най-съвместима с Java 11)
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          
          # Стартираме компилацията, като игнорираме Lint и дребни грешки
          ./gradlew assembleDebug -x lint -Pandroid.experimental.sdk.allowUnderlineSdkLevel=true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
