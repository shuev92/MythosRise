name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Extract Everything
        run: |
          # 1. Сваляме основния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Намираме ВСИЧКИ zip файлове вътре и ги разархивираме
          # Правим го рекурсивно, за да сме сигурни
          find . -name "*.zip" -not -name "main.zip" -exec unzip -o {} -d extracted_project \;

      - name: Build APK (Search and Destroy)
        run: |
          # Намираме къде е файлът gradlew, без значение колко дълбоко е
          REAL_PATH=$(find . -name "gradlew" -print -quit)
          
          if [ -z "$REAL_PATH" ]; then
            echo "ГРЕШКА: gradlew не е намерен никъде!"
            ls -R
            exit 1
          fi
          
          # Влизаме в папката на проекта
          PROJECT_ROOT=$(dirname "$REAL_PATH")
          cd "$PROJECT_ROOT"
          
          echo "Работим в директория: $PROJECT_ROOT"
          
          # Даваме права и строим
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
