name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Extract Project
        run: |
          # 1. Сваляме основния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Разархивираме вътрешния проект в папка "extracted"
          # Използваме кавички заради интервалите в името на файла
          unzip "MythosRise-main/MythosRise_v6_READY_TO_TEST.zip" -d extracted
          
          # 3. Търсим къде точно е gradlew и се местим там
          # Според снимката ти е в: extracted/MythosRise/
          cd extracted/MythosRise
          
          # Преместваме всичко от там в основната работна директория на GitHub
          mv * .[^.]* ../../ || true
          cd ../../
          
          # Почистване
          rm -rf main.zip MythosRise-main extracted

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
