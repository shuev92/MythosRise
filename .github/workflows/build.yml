name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5 # Инсталираме конкретна, стабилна версия директно

      - name: Extract Project Files
        run: |
          # 1. Сваляме основния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Намираме вътрешния архив и го разархивираме в папка "app_source"
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d app_source

      - name: Run Build
        run: |
          # Намираме къде е build.gradle
          ROOT_PATH=$(find app_source -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"
          
          echo "Проектът е намерен в: $PWD"
          
          # Тъй като нямаш gradlew файл, ползваме току-що инсталирания системно gradle
          gradle assembleDebug --stacktrace

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
