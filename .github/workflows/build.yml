name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Extract Source
        run: |
          # 1. Сваляме главния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Влизаме в папката и разархивираме истинския проект
          # Използваме wildcard (*), защото името съдържа интервали и версии
          unzip "MythosRise-main/MythosRise_v6_READY_TO_TEST*.zip" -d final_project
          
          # 3. Преместваме всичко в основната директория
          mv final_project/*/* . || mv final_project/* . || true

      - name: Grant execute permission for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "Грешка: gradlew все още липсва! Провери дали в под-архива има Android проект."
            ls -R
            exit 1
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
