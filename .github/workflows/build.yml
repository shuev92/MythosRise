name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (Strict Version Control)
        run: |
          # 1. Намиране на корена
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          # 2. ФИКС: Инсталираме точно Gradle 7.5 (за да избегнем грешката с Gradle 10)
          # Това е най-стабилната версия за твоя тип проект
          wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-7.5/bin:$PATH
          
          # 3. Генерираме wrapper-а с тази версия
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          
          # 4. СТАРТ: Компилация с игнориране на Lint
          ./gradlew assembleDebug -x lint

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
