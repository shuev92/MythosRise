name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          # 1. Сваляне на главния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Намиране на вътрешния ZIP и разархивирането му директно ТУК
          # Използваме -j (junk paths), за да изхвърлим излишните папки от архива
          find . -name "*.zip" -not -name "main.zip" -exec unzip -o -j {} -d . \;

      - name: Build APK
        run: |
          # Тъй като използвахме -j, gradlew ТРЯБВА да е тук
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            # Ако пак го няма, го търсим и влизаме при него
            GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
            PROJECT_DIR=$(dirname "$GRADLEW_PATH")
            cd "$PROJECT_DIR"
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
