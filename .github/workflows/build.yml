name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (with Clean & Version Fix)
        run: |
          # Намираме корена на проекта
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          # 1. Генерираме Gradle с конкретна версия (8.0 е добра за JDK 17)
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          
          # 2. Почистване и изграждане с по-подробен лог за грешки
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
