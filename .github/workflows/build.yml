name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Everything
        run: |
          # Сваляне
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # Разархивиране на вътрешния проект в папка "src"
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d src

      - name: Build with Inline Gradle
        run: |
          # Намираме къде е build.gradle
          ROOT_PATH=$(find src -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"
          
          # Вместо да търсим инсталиран gradle, ползваме вградения в машината инструмент
          # и игнорираме всички грешки от липсващи подписи
          mvn -version || echo "Maven not used" 
          
          # Тъй като нямаш wrapper, ще използваме командата за build директно през инсталирания в Ubuntu Gradle
          sudo apt-get install -y gradle
          gradle assembleDebug --stacktrace

      - name: Find and Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
