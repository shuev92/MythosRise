name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Extract Project Files
        run: |
          # Върнах работещия линк за изтегляне, за да избегнем 404 грешката
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d app_source

      - name: The Ultimate Fixes and Build
        run: |
          ROOT_PATH=$(find app_source -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"

          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          XML_FILE=$(find . -name "activity_world_map.xml" -print -quit)
          if [ -n "$XML_FILE" ]; then
            sed -i "124,\$d" "$XML_FILE"
          fi

          APP_GRADLE=$(find . -name "build.gradle" -path "*/app/*" -print -quit)
          if [ -n "$APP_GRADLE" ]; then
            sed -i "s/minSdk .*/minSdk 26/g" "$APP_GRADLE"
            sed -i "s/minSdkVersion .*/minSdkVersion 26/g" "$APP_GRADLE"
          fi

          find . -name "WorldMapActivityV5.kt" -exec rm -f {} \;

          FILE_TRANS=$(find . -name "TransformationActivity.kt" -print -quit)
          if [ -n "$FILE_TRANS" ]; then
            sed -i "72s/.*/\/\/ COMMENTED/" "$FILE_TRANS"
          fi

          FILE_BASE=$(find . -name "WorldMapActivity.kt" -print -quit)
          if [ -n "$FILE_BASE" ]; then
            sed -i "110s/.*/\/\/ COMMENTED/" "$FILE_BASE"
          fi

          FILE_V6=$(find . -name "WorldMapActivityV6.kt" -print -quit)
          if [ -n "$FILE_V6" ]; then
            for LINE in 123 141 196 213 224 226 228; do
              sed -i "${LINE}s/.*/\/\/ COMMENTED/" "$FILE_V6"
            done
          fi

          FILE_BOSS=$(find . -name "BossRushActivity.kt" -print -quit)
          if [ -n "$FILE_BOSS" ]; then
            sed -i "359,432s/.*/\/\/ COMMENTED/" "$FILE_BOSS"
          fi

          FILE_PRESTIGE=$(find . -name "PrestigeActivity.kt" -print -quit)
          if [ -n "$FILE_PRESTIGE" ]; then
            sed -i "134s/.*/\/\/ COMMENTED/" "$FILE_PRESTIGE"
          fi

          # Добавяме липсващите 2 скоби за QuestActivity, за да не гръмне пак там
          QUEST=$(find . -name "QuestActivity.kt" -print -quit)
          if [ -n "$QUEST" ]; then
            sed -i "174,234s/.*/\/\/ COMMENTED/" "$QUEST"
            echo "}" >> "$QUEST"
            echo "}" >> "$QUEST"
          fi

          gradle assembleDebug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
