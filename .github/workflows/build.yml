name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        # Тегли кода директно от хранилището, без нужда от външни ZIP файлове.

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Find and Build Project
        run: |
          # 1. Търсим автоматично къде е скрит файла gradlew.
          GRADLEW_PATH=$(find .
          
