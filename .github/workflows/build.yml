 name: Build MythosRise APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download zip from release
        run: |
          wget "https://github.com/shuev92/MythosRise/releases/download/v6/MythosRise_v6_READY_TO_TEST_.zip" -O project.zip

      - name: Unzip project
        run: unzip project.zip -d extracted

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradle permissions
        run: chmod +x extracted/*/gradlew

      - name: Build Debug APK
        run: cd extracted/*/ && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-debug
          path: extracted/**/app/build/outputs/apk/debug/*.apk         
