name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (Auto-Fix & Build)
        run: |
          # 1. Намиране на корена
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          # 2. Инсталиране на съвместим Gradle Wrapper
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          
          # 3. ПОПРАВКА: Премахваме дублиращи се или грешни настройки в движение
          # Това решава проблеми с несъвместими плъгини
          sed -i 's/android.defaults.buildfeatures.buildconfig=true//g' gradle.properties || true
          
          # 4. СТАРТ: Компилация с прескачане на проверките за грешки (Lint)
          ./gradlew assembleDebug -x lint --stacktrace

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
