name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          # Търсим вътрешния архив и го разархивираме
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d final_extract

      - name: Build APK (Fixing missing Gradle)
        run: |
          # 1. Намираме къде е основният build.gradle файл
          BUILD_GRADLE_PATH=$(find . -name "build.gradle" -not -path "*/app/*" -print -quit)
          PROJECT_ROOT=$(dirname "$BUILD_GRADLE_PATH")
          cd "$PROJECT_ROOT"
          
          echo "Проектът е в: $PROJECT_ROOT"
          
          # 2. Понеже няма gradlew, инсталираме го на място
          gradle wrapper
          
          # 3. Даваме права и строим
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
