name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Extract Project Files
        run: |
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          INNER_ZIP=$(find . -name "*.zip" -not -name "main.zip" -print -quit)
          unzip "$INNER_ZIP" -d app_source

      - name: Fix Code and Build APK
        run: |
          # 1. Намираме корена на проекта
          ROOT_PATH=$(find app_source -name "build.gradle" -not -path "*/app/*" -print -quit | xargs dirname)
          cd "$ROOT_PATH"
          
          # 2. Оправяме библиотеките (AndroidX)
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 3. ХИРУРГИЧЕСКА ПОПРАВКА: Изтриваме отрязания код в края на файла
          XML_FILE=$(find . -name "activity_world_map.xml" -print -quit)
          if [ -n "$XML_FILE" ]; then
            echo "Поправяме $XML_FILE..."
            # Командата търси "" и трие всичко от там до края
            sed -i '//,$d' "$XML_FILE"
            echo "Грешният код е премахнат!"
          fi
          
          # 4. Стартираме компилацията!
          gradle assembleDebug
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
