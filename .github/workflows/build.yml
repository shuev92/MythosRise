name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Everything
        run: |
          # 1. Сваляне и първо разархивиране
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Разархивиране на вътрешния проект
          # Търсим къде е вътрешният ZIP и го разархивираме в папка "deep_extract"
          INNER_ZIP=$(find . -name "MythosRise_v6_READY_TO_TEST.zip")
          unzip "$INNER_ZIP" -d deep_extract

      - name: Build APK (Auto-detect Path)
        run: |
          # Намираме къде е gradlew автоматично
          GRADLEW_PATH=$(find deep_extract -name "gradlew")
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          
          echo "Проектът е намерен в: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # Даваме права и строим
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
