name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download project zip
        # Замени линка по-долу с твоя реален линк, ако е различен
        run: wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O project.zip

      - name: Unzip project
        run: |
          unzip project.zip -d temp_folder
          cp -rn temp_folder/*/* . || cp -rn temp_folder/* . || true
          rm -rf temp_folder project.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
