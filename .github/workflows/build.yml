name: Build MythosRise APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          # 1. Сваляне на главния архив
          wget "https://github.com/shuev92/MythosRise/archive/refs/heads/main.zip" -O main.zip
          unzip main.zip
          
          # 2. Разархивиране на ВСИЧКИ вътрешни zip файлове автоматично
          # Използваме 'find', за да не ни пречат интервалите в имената
          find . -name "*.zip" -not -name "main.zip" -exec unzip -o {} -d extracted_source \;

      - name: Build APK
        run: |
          # Автоматично намиране на папката с gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          
          echo "Проектът е в: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Стартиране на компилацията
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythosRise-Final-APK
          path: "**/build/outputs/apk/debug/*.apk"
