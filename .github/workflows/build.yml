- name: Download Latest Release
  uses: dsaltares/fetch-gh-release-asset@master
  with:
    repo: 'shuev92/MythosRise'
    version: 'latest' # Автоматично взема последната версия
    file: 'MythosRise_v6_READY_TO_TEST_.zip' # Тук трябва да е точното име на файла
    token: ${{ secrets.GITHUB_TOKEN }}

- name: Unzip project
  run: |
    unzip MythosRise_v6_READY_TO_TEST_.zip -d app_source
